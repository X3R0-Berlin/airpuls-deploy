services:
  app:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    restart: unless-stopped

  app-dev:
    build:
      context: .
      target: deps
    command: npm run dev
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    profiles:
      - dev
